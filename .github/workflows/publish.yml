name: Build, Test and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      # Only publish to npm if pushing a tag or if version bumped on main.
      # If the version has not changed, we handle the error gracefully so the action doesn't fail.
      - name: Publish to npm
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [ "${{ github.event_name }}" == "push" ]; then
            # Check if package is already published to prevent action failure on version collision
            PACKAGE_NAME=$(node -e "const pkg = JSON.parse(require('fs').readFileSync('./package.json', 'utf8')); console.log(pkg.name)")
            PACKAGE_VERSION=$(node -e "const pkg = JSON.parse(require('fs').readFileSync('./package.json', 'utf8')); console.log(pkg.version)")
            if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
              echo "Version $PACKAGE_VERSION is already published to npm. Skipping publish."
            else
              echo "Publishing version $PACKAGE_VERSION..."
              pnpm publish --no-git-checks --access public
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
