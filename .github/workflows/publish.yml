name: Build, Test and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      # Only publish to npm if pushing a tag or if version bumped on main.
      - name: Publish to npm
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [ "${{ github.event_name }}" == "push" ]; then
            PACKAGE_NAME=$(node -e "const pkg = JSON.parse(require('fs').readFileSync('./package.json', 'utf8')); console.log(pkg.name)")
            PACKAGE_VERSION=$(node -e "const pkg = JSON.parse(require('fs').readFileSync('./package.json', 'utf8')); console.log(pkg.version)")
            
            # Temporarily disable exit-on-error so npm view failing on a new package doesn't crash the script
            set +e
            npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1
            IS_PUBLISHED=$?
            set -e

            if [ $IS_PUBLISHED -eq 0 ]; then
              echo "Version $PACKAGE_VERSION is already published to npm. Skipping publish."
            else
              echo "Publishing version $PACKAGE_VERSION..."
              pnpm publish --no-git-checks --access public --provenance
            fi
          fi
